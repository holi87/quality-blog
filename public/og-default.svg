<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e0f11"/>
      <stop offset="1" stop-color="#17181c"/>
    </linearGradient>
    <radialGradient id="glow1" cx="250" cy="180" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff7a1a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff7a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="950" cy="480" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#64d4ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#64d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff7a1a"/>
      <stop offset="1" stop-color="#64d4ff"/>
    </linearGradient>
    <linearGradient id="hlA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7a1a"/>
      <stop offset="1" stop-color="#ffb37a"/>
    </linearGradient>
    <linearGradient id="hlB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#64d4ff"/>
      <stop offset="1" stop-color="#9ae3ff"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logomark -->
  <g transform="translate(80, 80)">
    <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="url(#mark)" stroke-width="4"/>
    <circle cx="44" cy="44" r="7" fill="#ff7a1a"/>
    <path d="M20 20 L36 20 L36 36" fill="none" stroke="#ecebe6" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="44" font-family="Georgia, serif" font-size="36" font-weight="500" fill="#ecebe6" letter-spacing="-0.8">
      quality<tspan font-style="italic" fill="#ff7a1a">blog</tspan>
    </text>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="230" font-family="'SF Mono', Menlo, monospace" font-size="18" fill="#a8a59d" letter-spacing="5" style="text-transform: uppercase">
    SMART HOME · AI · AUTOMATION
  </text>

  <!-- Title -->
  <text x="80" y="340" font-family="Georgia, serif" font-weight="500" font-size="96" fill="#ecebe6" letter-spacing="-2.5">
    Wiedza o
  </text>
  <text x="80" y="460" font-family="Georgia, serif" font-weight="500" font-size="96" letter-spacing="-2.5">
    <tspan font-style="italic" fill="url(#hlA)">smart home</tspan>
    <tspan fill="#767268"> i </tspan>
    <tspan font-style="italic" fill="url(#hlB)">AI</tspan>
    <tspan fill="#ecebe6">.</tspan>
  </text>

  <!-- Footer -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#2a2b31" stroke-width="1"/>
  <text x="80" y="580" font-family="'SF Mono', Menlo, monospace" font-size="20" fill="#a8a59d">
    quality-blog.eu
  </text>
  <text x="1120" y="580" text-anchor="end" font-family="'SF Mono', Menlo, monospace" font-size="20" fill="#767268">
    edycja 2026 · bez paywalli
  </text>
</svg>
